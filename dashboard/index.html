<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&family=Source+Serif+4:ital,wght@0,400;1,400&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg:      #faf9f5;
      --surface: #f2f0e8;
      --dark:    #141413;
      --mid:     #9a9890;
      --muted:   #7c7a72;
      --border:  #dedad0;
      --orange:  #d97757;
      --blue:    #6a9bcc;
      --green:   #788c5d;
      --warm:    #b09050;
      --purple:  #a86070;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .header-left h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 32px;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .header-left .meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── Filter Pills ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .pill {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .pill.active,
    .pill:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    /* ── Section Label ── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--mid);
      margin-bottom: 14px;
    }

    /* ── This-Week Panel ── */
    .week-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 40px;
      background: var(--surface);
    }

    .week-panel .section-label {
      margin-bottom: 12px;
    }

    .week-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .week-item:last-child { border-bottom: none; }

    .week-item-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .week-item-title {
      font-size: 13px;
      color: var(--dark);
    }

    .week-item-course {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--mid);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .week-item-due {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      white-space: nowrap;
      margin-left: 16px;
    }

    .week-empty {
      color: var(--mid);
      font-size: 13px;
      padding: 8px 0;
    }

    /* ── Course Cards ── */
    .courses-section .section-label { margin-bottom: 16px; }

    .course-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .course-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      background: var(--surface);
      transition: background 0.12s;
      user-select: none;
    }

    .course-header:hover { background: #ede9df; }

    .course-header-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .course-name {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 16px;
      font-weight: 400;
    }

    .course-code {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--mid);
    }

    .course-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .course-badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .course-badge.urgent { color: var(--orange); }

    .chevron {
      font-size: 12px;
      color: var(--mid);
      transition: transform 0.2s;
    }

    .course-card.open .chevron { transform: rotate(180deg); }

    /* ── Course Body ── */
    .course-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .course-card.open .course-body { display: block; }

    /* Weight Bar */
    .weight-section {
      padding: 16px 0 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .weight-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid);
      margin-bottom: 10px;
    }

    .weight-bar-container {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
      gap: 2px;
    }

    .weight-bar-segment {
      height: 100%;
      border-radius: 2px;
      transition: flex 0.3s;
    }

    .weight-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
      margin-top: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Assignment List */
    .assignment-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .assignment-item:last-child { border-bottom: none; }

    .assignment-item.submitted { opacity: 0.5; }

    .assignment-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }

    .assignment-title {
      font-size: 13px;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 480px;
    }

    .assignment-group {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--mid);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .assignment-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      margin-left: 16px;
      flex-shrink: 0;
    }

    .due-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      white-space: nowrap;
    }

    .submitted-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Assignment Description (accordion) */
    .assignment-desc {
      display: none;
      padding: 10px 0 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      border-bottom: 1px solid var(--border);
    }

    .assignment-desc.open { display: block; }

    .assignment-desc-inner {
      max-height: 200px;
      overflow-y: auto;
    }

    .assignment-desc-inner * { max-width: 100%; }

    /* ── Sync button in header ── */
    .btn-sync {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .btn-sync:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    /* ── Colours by urgency ── */
    .due-urgent  { color: var(--orange); }
    .due-soon    { color: var(--warm); }
    .due-later   { color: var(--blue); }
    .due-past    { color: var(--mid); opacity: 0.4; }
    .due-exam    { color: var(--purple); }
    .due-none    { color: var(--mid); }

    /* ── Loading / Empty state ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--mid);
    }

    .state-msg .big {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .state-msg .small {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1>Canvas Dashboard</h1>
        <div class="meta" id="header-meta">載入中...</div>
      </div>
      <div class="header-right">
        <button class="btn-sync" id="sync-btn">同步</button>
      </div>
    </div>

    <div class="filter-bar">
      <button class="pill active" data-filter="all">全部</button>
      <button class="pill" data-filter="unsubmitted">未繳</button>
      <button class="pill" data-filter="submitted">已繳</button>
    </div>

    <div id="week-section"></div>
    <div id="courses-section"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
