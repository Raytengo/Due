<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Due</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&family=Source+Serif+4:wght@400&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f2f0e8;
      --surface: #f2f0e8;
      --dark: #141413;
      --mid: #9a9890;
      --muted: #7c7a72;
      --border: #dedad0;
      --orange: #d97757;
      --blue: #6a9bcc;
      --green: #788c5d;
      --warm: #b09050;
      --purple: #a86070;
    }

    html[data-theme="dark"] {
      --bg: #23262d;
      --surface: #23262d;
      --dark: #eceff4;
      --mid: #9aa3b2;
      --muted: #7f8897;
      --border: #343843;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      padding: 18px 18px 14px;
      margin: 0;
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .usage-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .usage-chip {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.35);
      color: var(--dark);
      border-radius: 999px;
      padding: 4px 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.04em;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, color 0.15s;
    }

    .usage-chip:hover {
      transform: translateY(-1px);
      border-color: var(--orange);
      color: var(--orange);
    }

    .usage-chip.usage-high {
      background: rgba(217, 119, 87, 0.08);
      border-color: rgba(217, 119, 87, 0.4);
      color: var(--orange);
    }

    .usage-chip.usage-full {
      background: rgba(224, 90, 71, 0.08);
      border-color: rgba(224, 90, 71, 0.4);
      color: #e05a47;
    }

    .usage-chip.is-empty {
      color: var(--muted);
    }

    .usage-refresh {
      width: 20px;
      height: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, color 0.15s;
    }

    .usage-refresh:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--orange);
      color: var(--orange);
    }

    .usage-refresh:disabled {
      opacity: 0.45;
      cursor: progress;
    }

    .task-list {
      list-style: none;
      margin-bottom: 0;
      max-height: 320px;
      overflow-y: auto;
    }

    .task-list::-webkit-scrollbar {
      width: 3px;
    }

    .task-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .task-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .task-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-dot.urgent {
      background: var(--orange);
    }

    .task-dot.soon {
      background: var(--warm);
    }

    .task-dot.exam {
      background: var(--purple);
    }

    .task-dot.later {
      background: var(--blue);
    }

    .task-body {
      flex: 1;
      min-width: 0;
    }

    .task-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .task-name.clickable {
      cursor: pointer;
    }

    .task-name.clickable:hover {
      color: var(--orange);
      text-decoration: underline;
    }

    .task-meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 1px;
    }

    .task-due {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      flex-shrink: 0;
      padding: 2px 7px;
      border-radius: 5px;
      border: 1px solid currentColor;
    }

    .task-due.urgent {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    .task-due.soon {
      background: var(--warm);
      border-color: var(--warm);
      color: #fff;
    }

    .task-due.exam {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    .task-due.later {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .empty-state {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--mid);
      text-align: center;
      padding: 24px 0 20px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 5px 0 12px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--dark);
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .btn:hover {
      background: #2a2a27;
    }

    .btn {
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="popup-header">
    <div class="section-label" id="task-label">NEXT 7-D TASKS</div>
    <div class="usage-actions">
      <button class="usage-chip is-empty" id="claude-usage-chip" type="button" title="Claude usage">CLAUDE --</button>
      <button class="usage-refresh" id="claude-usage-refresh" type="button"
        title="Refresh Claude usage">&#8635;</button>
    </div>
  </div>
  <ul class="task-list" id="task-list"></ul>

  <hr class="divider" />
  <button class="btn" id="dashboard-btn">開啟 Dashboard</button>

  <script src="popup.js"></script>
</body>

</html>
