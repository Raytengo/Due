<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 設定 — Canvas Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&family=Source+Serif+4:wght@400&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg:      #faf9f5;
      --surface: #f2f0e8;
      --dark:    #141413;
      --mid:     #9a9890;
      --muted:   #7c7a72;
      --border:  #dedad0;
      --orange:  #d97757;
      --green:   #788c5d;
      --blue:    #6a9bcc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px 80px;
    }

    .card {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 28px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid);
      margin-bottom: 36px;
    }

    /* ── Model selector ── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--mid);
      margin-bottom: 10px;
    }

    .model-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .model-option {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .model-option:hover {
      border-color: var(--mid);
    }

    .model-option.active {
      border-color: var(--orange);
      background: var(--bg);
    }

    .model-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .model-radio-dot {
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .model-option.active .model-radio-dot {
      border-color: var(--orange);
    }

    .model-radio-dot::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .model-option.active .model-radio-dot::after {
      opacity: 1;
    }

    .model-info {
      flex: 1;
      min-width: 0;
    }

    .model-name {
      font-size: 13px;
      color: var(--dark);
      font-weight: 400;
    }

    .model-desc {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--mid);
      margin-top: 2px;
    }

    /* ── Provider sections ── */
    .provider-section {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
      margin-bottom: 16px;
      background: var(--surface);
      transition: opacity 0.15s;
    }

    .provider-section.dimmed {
      opacity: 0.45;
    }

    .provider-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .provider-title {
      font-size: 14px;
      color: var(--dark);
    }

    .provider-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--mid);
    }

    .provider-badge.active-badge {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(217, 119, 87, 0.07);
    }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="text"] {
      display: block;
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 4px;
    }

    input:focus { border-color: var(--orange); }

    .field-row {
      margin-bottom: 14px;
    }

    .toggle-vis {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--mid);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .toggle-vis:hover { color: var(--orange); }

    .field-hint {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--mid);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 10px 14px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      border: 1px solid var(--dark);
      background: var(--dark);
      color: var(--bg);
    }

    .btn:hover { background: #2a2a27; border-color: #2a2a27; }

    .btn.secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    .btn.secondary:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .status {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-align: center;
      margin-top: 14px;
      min-height: 16px;
    }

    .status.ok  { color: var(--green); }
    .status.err { color: var(--orange); }

    .global-hint {
      font-size: 12px;
      color: var(--mid);
      margin-top: 20px;
      line-height: 1.55;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI 分析設定</h1>
    <div class="subtitle">Canvas Dashboard · AI 模型整合</div>

    <div class="section-label">使用模型</div>
    <div class="model-selector">
      <label class="model-option active" id="opt-gemini">
        <input type="radio" name="ai-model" value="gemini" checked />
        <div class="model-radio-dot"></div>
        <div class="model-info">
          <div class="model-name">Gemini</div>
          <div class="model-desc">Google AI Studio</div>
        </div>
      </label>
      <label class="model-option" id="opt-claude">
        <input type="radio" name="ai-model" value="claude" />
        <div class="model-radio-dot"></div>
        <div class="model-info">
          <div class="model-name">Claude</div>
          <div class="model-desc">Anthropic</div>
        </div>
      </label>
    </div>

    <!-- Gemini section -->
    <div class="provider-section" id="section-gemini">
      <div class="provider-header">
        <span class="provider-title">Google Gemini</span>
        <span class="provider-badge active-badge" id="badge-gemini">使用中</span>
      </div>

      <div class="field-row">
        <label for="gemini-key">Google AI Studio API 金鑰</label>
        <input type="password" id="gemini-key" placeholder="AIza..." autocomplete="off" spellcheck="false" />
        <button class="toggle-vis" data-target="gemini-key">顯示</button>
      </div>

      <div class="field-row">
        <label for="gemini-model">模型 ID</label>
        <input type="text" id="gemini-model" value="gemini-2.0-flash-lite" spellcheck="false" />
        <div class="field-hint">常用：gemini-2.0-flash-lite · gemini-2.0-flash · gemini-1.5-flash</div>
      </div>
    </div>

    <!-- Claude section -->
    <div class="provider-section dimmed" id="section-claude">
      <div class="provider-header">
        <span class="provider-title">Anthropic Claude</span>
        <span class="provider-badge" id="badge-claude">備用</span>
      </div>

      <div class="field-row">
        <label for="claude-key">Anthropic API 金鑰</label>
        <input type="password" id="claude-key" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
        <button class="toggle-vis" data-target="claude-key">顯示</button>
      </div>

      <div class="field-hint" style="margin-top:0">固定使用 claude-opus-4-6 模型</div>
    </div>

    <div class="actions">
      <button class="btn" id="save-btn">儲存設定</button>
      <button class="btn secondary" id="clear-btn">清除所有金鑰</button>
    </div>

    <div class="status" id="status"></div>

    <div class="global-hint">金鑰儲存於本機 chrome.storage.local，不會上傳任何伺服器。</div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
