<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API 設定 — Due</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&family=Source+Serif+4:wght@400&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg:      #faf9f5;
      --surface: #f2f0e8;
      --dark:    #141413;
      --mid:     #9a9890;
      --muted:   #7c7a72;
      --border:  #dedad0;
      --orange:  #d97757;
      --green:   #788c5d;
      --blue:    #6a9bcc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      display: block;
      padding: 14px 16px 18px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 28px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid);
      margin-bottom: 16px;
    }

    /* ── Provider selector ── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--mid);
      margin-bottom: 10px;
    }

    .provider-select-wrap {
      margin-bottom: 12px;
    }

    .provider-select {
      width: 100%;
      padding: 10px 40px 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background-color: var(--bg);
      background-image:
        linear-gradient(45deg, transparent 50%, var(--mid) 50%),
        linear-gradient(135deg, var(--mid) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 2px),
        calc(100% - 12px) calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      appearance: none;
      -webkit-appearance: none;
      color: var(--dark);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .provider-select:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.14);
    }

    /* ── Provider sections ── */
    .provider-section {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: var(--surface);
      transition: opacity 0.15s;
    }

    .provider-section.dimmed {
      opacity: 0.45;
    }

    .provider-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .provider-title {
      font-size: 14px;
      color: var(--dark);
    }

    .provider-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--mid);
    }

    .provider-badge.active-badge {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(217, 119, 87, 0.07);
    }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="text"] {
      display: block;
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 4px;
    }

    input:focus { border-color: var(--orange); }

    .field-row {
      margin-bottom: 10px;
    }

    .toggle-vis {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--mid);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .toggle-vis:hover { color: var(--orange); }

    .field-hint {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--mid);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px 14px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      border: 1px solid var(--dark);
      background: var(--dark);
      color: var(--bg);
    }

    .btn:hover { background: #2a2a27; border-color: #2a2a27; }

    .btn.secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    .btn.secondary:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .status {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-align: center;
      margin-top: 14px;
      min-height: 16px;
    }

    .status.ok  { color: var(--green); }
    .status.err { color: var(--orange); }

    .global-hint {
      font-size: 12px;
      color: var(--mid);
      margin-top: 10px;
      line-height: 1.55;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>API 設定</h1>
    <div class="subtitle">Due · Provider + Model</div>

    <div class="section-label">服務商</div>
    <div class="provider-select-wrap">
      <select id="provider-select" class="provider-select">
        <option value="gemini">Gemini</option>
        <option value="anthropic">Anthropic</option>
        <option value="openai">OpenAI</option>
        <option value="minimax">MiniMax</option>
        <option value="qwen">Qwen</option>
      </select>
    </div>

    <div class="provider-section" id="provider-config-section">
      <div class="provider-header">
        <span class="provider-title" id="provider-title">Google Gemini</span>
        <span class="provider-badge active-badge" id="provider-badge">使用中</span>
      </div>

      <div class="field-row">
        <label for="provider-key">API 金鑰</label>
        <input type="password" id="provider-key" placeholder="輸入 API Key" autocomplete="off" spellcheck="false" />
        <button class="toggle-vis" data-target="provider-key">顯示</button>
      </div>

      <div class="field-row">
        <label for="provider-model">模型 ID</label>
        <input type="text" id="provider-model" value="" spellcheck="false" />
        <div class="field-hint" id="provider-model-hint">例如：gemini-2.0-flash-lite</div>
      </div>

      <div class="field-row">
        <label for="provider-base-url">Base URL</label>
        <input type="text" id="provider-base-url" value="https://generativelanguage.googleapis.com/v1beta" spellcheck="false" />
        <div class="field-hint" id="provider-base-url-hint">留預設即可；OpenAI 相容服務可改成對應 endpoint</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="save-btn">儲存設定</button>
      <button class="btn secondary" id="clear-btn">清除所有金鑰</button>
    </div>

    <div class="status" id="status"></div>

    <div class="global-hint">金鑰儲存於本機 chrome.storage.local，不會上傳任何伺服器。</div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
